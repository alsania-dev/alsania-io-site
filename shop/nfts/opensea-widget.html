<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemonic NFT Gallery | OpenSea Widget</title>
    <meta name="description" content="Sigma's NFT collection with OpenSea widget - auto updates, marketplace links included.">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GYKRZLYBXQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-GYKRZLYBXQ');
    </script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="../../assets/css/styles.css">
    
    <!-- OpenSea Widget -->
    <script src="https://unpkg.com/embeddable-nfts/dist/nft-card.min.js"></script>
    
    <style>
        .wallet-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .wallet-address {
            background: rgba(0,212,255,0.1);
            padding: 15px;
            border-radius: var(--border-radius);
            margin: 20px 0;
            font-family: monospace;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Header Component -->
    <div id="header-container"></div>
    
    <section class="section">
        <div class="container">
            <h1 style="text-align: center; margin-bottom: 20px;">Mnemonic NFT Gallery</h1>
            <p style="text-align: center; max-width: 800px; margin: 0 auto 30px; color: var(--text-secondary);">
                Auto-loaded from wallet. Click any NFT for marketplace links.
            </p>
            
            <div class="wallet-address">
                Wallet: <strong>0x78dB155AA7f39A8D13a0e1E8EEB41d71e2ce3F43</strong>
            </div>
            
            <!-- OpenSea Widget - Shows ALL NFTs from wallet -->
            <div class="wallet-gallery">
                <nft-card
                    contractAddress="0x78dB155AA7f39A8D13a0e1E8EEB41d71e2ce3F43"
                    tokenId="1"
                    network="ethereum"
                ></nft-card>
                
                <nft-card
                    contractAddress="0x51391dbea7f8bc3a34c6950a5d88b8e50876c27a"
                    tokenId="1"
                    network="polygon"
                ></nft-card>
                
                <nft-card
                    contractAddress="0x78dB155AA7f39A8D13a0e1E8EEB41d71e2ce3F43"
                    tokenId="77"
                    network="polygon"
                ></nft-card>
            </div>
            
            <div style="text-align: center; margin-top: 40px; padding: 20px; background: var(--bg-tertiary); border-radius: var(--border-radius);">
                <h3>Want to add your NFT?</h3>
                <p>Just provide contract address and token ID. We add the widget.</p>
                <p><small>No manual details needed - widget fetches everything.</small></p>
            </div>
        </div>
    </section>
    
    <!-- Footer Component -->
    <div id="footer-container"></div>
    
    <!-- JavaScript -->
    <script src="../../assets/js/scripts.js"></script>
    <script src="../../loadComponents.js"></script>
    
    <script>
        // You would need to add more NFT cards here
        // Each one is: <nft-card contractAddress="..." tokenId="..." network="..."></nft-card>
        
        // To get all NFTs from your wallet automatically, you'd need:
        // 1. Covalent API call to get all NFT contracts/tokenIds
        // 2. Generate nft-card elements for each
        // But that's API complexity again...
        
        // Alternative: Use OpenSea's profile embed (above) for full auto-loading
    </script>
</body>
</html>
